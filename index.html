<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Storybook | Tanah Perjanjian Di Ufuk Barat | Home</title>
        <link rel="stylesheet" href="https://w3schools.com/w3css/5/w3.css" />
        <link rel="stylesheet" href="https://www.w3schools.com/lib/w3-theme-dark-grey.css">
        <script src="https://kit.fontawesome.com/acda0af544.js" crossorigin="anonymous"></script>
        <meta property="og:type" content="website">
        <meta property="og:url" content="https://cersil-alessandra.netlify.app/">
        <meta property="og:title" content="Cersil Alessandra">
        <meta property="og:description" content="Nikmati pengalaman baru membaca cerita silat dengan metode narasi paralel interaktif modern.">
        <meta property="og:image" content="https://cersil-alessandra.netlify.app/og-preview.jpg">

        <!-- Twitter Meta Tags (Agar rapi juga saat dibagikan di X/Twitter) -->
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:url" content="https://cersil-alessandra.netlify.app/">
        <meta name="twitter:title" content="Cersil Alessandra">
        <meta name="twitter:description" content="Nikmati pengalaman baru membaca cerita silat dengan metode narasi paralel interaktif modern.">
        <meta name="twitter:image" content="https://cersil-alessandra.netlify.app/og-preview.jpg">
    </head>
    <body class="w3-theme-d5">
        <div id="top"></div>
        <main id="main-content" class="w3-main"></main>
        <section id="books" class="w3-container">
            <hr style="color:antiquewhite">
            <div class="w3-content">
                <h2 class="w3-center">Books</h2>
                <div class="w3-flex" style="gap:10px">
                    <div class="w3-card w3-flex-item">
                        <img class="w3-image"
                            src="/images/tiny/dinasti-yuan.jpg"
                            alt="Dinasti Yuan" />
                    </div>
                    <div class="w3-card w3-flex-item">
                        <img class="w3-image"
                            src="/images/tiny/rahasia-pedang-dan-golok.jpg"
                            alt="Rahasia Pedang Dan Golok" />
                    </div>
                    <div class="w3-card w3-flex-item">
                        <img class="w3-image"
                            src="/images/tiny/hongjin-qiyi.jpg"
                            alt="Pemberontakan" />
                    </div>
                    <div class="w3-card w3-flex-item">
                        <img class="w3-image"
                            src="/images/tiny/plitwh.jpg"
                            alt="Tanah Perjanjian Di Ufuk Barat" />
                    </div>
                </div>
            </div>
        </section>
        <section id="blogs" class="w3-container">
            <div class="w3-content">
                <div class="w3-panel w3-theme-d3 w3-center w3-round-large">
                    <p>
                        <em>
                            "Make it simple, but not simpler" <br />
                        </em>
                        &mdash; Albert Einstein
                    </p>
                </div>
                <div class="w3-bar-block" style="width:130px">
                    <button class="w3-bar-item w3-button" onclick="testRender('render-target')">Test Click</button>
                </div>
                <div id="render-target"></div>
            </div>
        </section>
        <footer class="w3-theme-d5">
            <div class="w3-container w3-padding-64">
                <div class="w3-content w3-border w3-padding-small w3-round-large">
                    <p class="w3-center">Copyright, &copy; 2026, FX. Adi Lima</p>
                </div>
            </div>
        </footer>
    </body>
    <script type="module" src="/src/main.tsx"></script>
</html>
